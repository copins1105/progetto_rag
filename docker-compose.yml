services:

  db_marker:
    image: ankane/pgvector:latest
    container_name: policy_db_marker
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: POLICYNAVIGATOR
    volumes:
      - ./sql_scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  chroma_marker:
    image: chromadb/chroma:latest
    container_name: chromadb_marker
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ./chroma_data:/chroma/chroma

  db_mistral:
    image: ankane/pgvector:latest
    container_name: policy_db_mistral
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: POLICYNAVIGATOR
    volumes:
      - ./sql_scripts:/docker-entrypoint-initdb.d
      - postgres_data_mistral:/var/lib/postgresql/data

  chroma_mistral:
    image: chromadb/chroma:latest
    container_name: chromadb_mistral
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ./chroma_data_mistral:/chroma/chroma

  # ← NUOVI: solo questi due aggiungi
  chroma_ui_marker:
    image: mintplexlabs/vectoradmin:latest
    container_name: chromadb_ui_marker
    ports:
      - "3002:3000"
    depends_on:
      - db_marker
      - chroma_marker
    environment:
      - VECTOR_ADMIN_ENVIRONMENT=production
      - DATABASE_CONNECTION_STRING=postgresql://admin:POLICYNAVIGATOR@db_marker:5432/vectoradmin_marker
      - JWT_SECRET=vectoradmin_secret_marker_32chars!!
      - INNGEST_EVENT_KEY=background_workers
      - INNGEST_SIGNING_KEY=background_workers

  chroma_ui_mistral:
    image: mintplexlabs/vectoradmin:latest
    container_name: chromadb_ui_mistral
    ports:
      - "3003:3000"
    depends_on:
      - db_mistral
      - chroma_mistral
    environment:
      - VECTOR_ADMIN_ENVIRONMENT=production
      - DATABASE_CONNECTION_STRING=postgresql://admin:POLICYNAVIGATOR@db_mistral:5432/vectoradmin_mistral
      - JWT_SECRET=vectoradmin_secret_mistral_32chars!
      - INNGEST_EVENT_KEY=background_workers
      - INNGEST_SIGNING_KEY=background_workers

volumes:
  postgres_data:
  postgres_data_mistral: