services:

  # ═══════════════════════════════════════════════════════════
  # STACK MARKER (pipeline originale — porta 5432 / 8000)
  # Usa i volumi ESISTENTI: dati già presenti preservati.
  # ═══════════════════════════════════════════════════════════

  db_marker:
    image: ankane/pgvector:latest
    container_name: policy_db_marker
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: POLICYNAVIGATOR
    volumes:
      - ./sql_scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data      # ← volume VECCHIO, dati esistenti

  chroma_marker:
    image: chromadb/chroma:latest
    container_name: chromadb_marker
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ./chroma_data:/chroma/chroma                # ← cartella VECCHIA, dati esistenti

  # ═══════════════════════════════════════════════════════════
  # STACK MISTRAL (nuova pipeline — porta 5433 / 8001)
  # Volumi nuovi, completamente vuoti.
  # Lo schema SQL viene applicato automaticamente al primo avvio.
  # ═══════════════════════════════════════════════════════════

  db_mistral:
    image: ankane/pgvector:latest
    container_name: policy_db_mistral
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: POLICYNAVIGATOR
    volumes:
      - ./sql_scripts:/docker-entrypoint-initdb.d   # stesso schema SQL
      - postgres_data_mistral:/var/lib/postgresql/data  # ← volume NUOVO, vuoto

  chroma_mistral:
    image: chromadb/chroma:latest
    container_name: chromadb_mistral
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ./chroma_data_mistral:/chroma/chroma        # ← cartella NUOVA, vuota

volumes:
  postgres_data:           # volume vecchio — Docker lo riconosce e preserva i dati
  postgres_data_mistral:   # volume nuovo — Docker lo crea vuoto al primo avvio